  <text x="33" y="88" font-size="8" fill="white" font-family="Arial" font-weight="bold" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial;font-size:8px;font-weight:700;text-anchor:start;dominant-baseline:auto">E</text>

  <!-- F - rojo -->
  <polygon points="22,92 72,92 78,97 72,102 22,102" fill="#f44336" style="fill:rgb(244, 67, 54);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="33" y="100" font-size="8" fill="white" font-family="Arial" font-weight="bold" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial;font-size:8px;font-weight:700;text-anchor:start;dominant-baseline:auto">F</text>
