  <text x="33" y="76" font-size="8" fill="#333" font-family="Arial" font-weight="bold" style="fill:rgb(51, 51, 51);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial;font-size:8px;font-weight:700;text-anchor:start;dominant-baseline:auto">D</text>

